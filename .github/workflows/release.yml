name: Build & Release binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  exe:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend (root base path for the bundled EXE)
        env:
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_SITE_URL: "https://rbkhan007.github.io/Ollama-Emulator-Desktop-Ultimate"
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: python -m PyInstaller --onefile --console --name "OllamaEmu" --add-data "frontend\out;frontend\out" --add-data "rag.py;." --add-data "memory.py;." --add-data "README.md;." --hidden-import numpy --collect-data numpy --hidden-import python_multipart --hidden-import multipart --hidden-import uvicorn.workers --hidden-import uvicorn.logging --distpath "dist" --workpath "build" --specpath "." --clean --icon "brand-mark.ico" ollama_emu_desktop.py

      - name: Finalize dist
        run: |
          copy README.md dist\README.md
          copy .env.example dist\.env.example
          copy opencode.example.json dist\opencode.example.json
          copy dist\OllamaEmu.exe dist\software.exe

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          files: |
            dist/OllamaEmu.exe
            dist/software.exe

  apk:
    name: Build Android APK (EAS)
    runs-on: ubuntu-latest
    if: ${{ secrets.EXPO_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: EAS build
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK and download artifact
        working-directory: mobile
        run: |
          npm ci
          APK_URL=$(eas build -p android --profile apk --non-interactive --wait | grep -oE 'https://[^ ]+\.apk' | tail -1)
          echo "Artifact URL: $APK_URL"
          curl -L -o OllamaEmu.apk "$APK_URL"

      - name: Upload APK to GitHub Release
        if: ${{ success() }}
        uses: softprops/action-gh-release@v2
        with:
          files: mobile/OllamaEmu.apk
