name: Lighthouse Audit

on:
  deployment
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    name: Audit all pages (target 100)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.0
      - name: Run Lighthouse against the live site
        run: lhci autorun
