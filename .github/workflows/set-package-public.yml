name: Set package public

on:
  workflow_dispatch:

permissions:
  packages: write

jobs:
  public:
    runs-on: ubuntu-latest
    steps:
      - name: Make npm package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for url in \
            "/user/packages/npm/%40rbkhan007%2Follama-emulator-desktop-ultimate/visibility" \
            "/user/packages/npm/ollama-emulator-desktop-ultimate/visibility" \
            "/repos/rbkhan007/ollamomui/packages/npm/ollamomui/visibility" ; do
            echo "Trying: $url"
            if gh api --method PATCH "$url" -f visibility=public; then
              echo "SUCCESS via $url"
              exit 0
            fi
          done
          echo "All attempts failed"
          exit 1
