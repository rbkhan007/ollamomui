# OllamoMUI – Nginx Reverse Proxy Configuration
# Place in /etc/nginx/sites-available/ollamomui
# Then: ln -s /etc/nginx/sites-available/ollamomui /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    server_name ollamomui.com api.ollamomui.com;
    return 301 https://$host$request_uri;
}

# ── Global SSL defaults ──
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers on;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 10m;
ssl_session_tickets off;

# ── Frontend (ollamomui.com) ──
server {
    listen 443 ssl http2;
    server_name ollamomui.com;

    ssl_certificate     /etc/letsencrypt/live/ollamomui.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ollamomui.com/privkey.pem;

    root /var/www/ollamomui/frontend;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 256;

    # Static assets with cache
    location /_next/static {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}

# ── Backend API (api.ollamomui.com) ──
server {
    listen 443 ssl http2;
    server_name api.ollamomui.com;

    ssl_certificate     /etc/letsencrypt/live/api.ollamomui.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ollamomui.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:11434;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }
}
